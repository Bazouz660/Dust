name: Release

on:
  workflow_run:
    workflows: [Build]
    types: [completed]

permissions:
  contents: write

jobs:
  # Verify Steam credentials and workshop item before doing anything
  verify-workshop:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install SteamCMD
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y lib32gcc-s1
          mkdir -p ~/steamcmd && cd ~/steamcmd
          curl -sqL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" | tar xz
          echo "$HOME/steamcmd" >> "$GITHUB_PATH"

      - name: Restore Steam config
        run: |
          mkdir -p ~/steamcmd/config
          mkdir -p ~/.steam/steam/config
          echo "${{ secrets.STEAM_CONFIG_VDF }}" | base64 -d | tee ~/steamcmd/config/config.vdf ~/.steam/steam/config/config.vdf > /dev/null

      - name: Verify Steam login
        run: |
          echo "=== Testing Steam authentication ==="
          ~/steamcmd/steamcmd.sh +login ${{ secrets.STEAM_USERNAME }} +quit
          echo "Steam login successful"

      - name: Verify mod metadata
        run: |
          echo "=== Verifying mod metadata ==="
          WORKSHOP_ID=$(grep -oP '<id>\K[^<]+' mod/_Dust.info)
          echo "Workshop ID in _Dust.info: $WORKSHOP_ID"
          if [ "$WORKSHOP_ID" != "3703458265" ]; then
            echo "ERROR: Workshop ID mismatch! Expected 3703458265, got $WORKSHOP_ID"
            exit 1
          fi
          echo "Workshop ID verified"

      - name: Verify VDF configuration
        run: |
          echo "=== Checking workshop.vdf ==="
          cat .github/workshop.vdf

          # Verify appid and publishedfileid match
          grep -q '"233860"' .github/workshop.vdf || { echo "ERROR: appid mismatch"; exit 1; }
          grep -q '"3703458265"' .github/workshop.vdf || { echo "ERROR: publishedfileid mismatch"; exit 1; }
          echo "VDF configuration verified"

  release:
    runs-on: ubuntu-latest
    needs: verify-workshop
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "label=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: Dust-${{ steps.version.outputs.label }}
          path: release/Dust
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create zip
        run: |
          cd release
          zip -r ../Dust-${{ steps.version.outputs.label }}.zip Dust

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.label }}
          files: Dust-${{ steps.version.outputs.label }}.zip
          generate_release_notes: true

      - name: Prepare Workshop content
        run: |
          cp mod/_Dust.info release/Dust/
          cp mod/_Dust.img release/Dust/ 2>/dev/null || true
          TAG="${{ steps.version.outputs.label }}"
          DESCRIPTION_PATH="$PWD/mod/workshop_description.txt"
          sed "s|content/Dust|$PWD/release/Dust|;s|DESCRIPTION_FILE_PLACEHOLDER|$DESCRIPTION_PATH|;s|CHANGENOTE_PLACEHOLDER|$TAG|" \
            .github/workshop.vdf > workshop_upload.vdf
          cat workshop_upload.vdf

      - name: Upload to Steam Workshop
        uses: game-ci/steam-deploy@v3
        with:
          appId: 233860
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          workshopVdf: workshop_upload.vdf
