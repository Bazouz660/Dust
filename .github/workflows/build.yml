name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
          lfs: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "label=$TAG" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "value=0.0.0-dev.$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "label=dev-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Boost headers
        run: |
          cd external\KenshiLib_Examples_deps\boost_1_60_0
          tar -xf boost.zip

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build host (Dust.dll)
        run: >
          msbuild src\Dust.vcxproj
          /p:Configuration=Release
          /p:Platform=x64
          /p:ExtraDefines=DUST_VERSION=${{ steps.version.outputs.value }}

      - name: Build SSAO plugin (DustSSAO.dll)
        run: >
          msbuild effects\ssao\DustSSAO.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build LUT plugin (DustLUT.dll)
        run: >
          msbuild effects\lut\DustLUT.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Bloom plugin (DustBloom.dll)
        run: >
          msbuild effects\bloom\DustBloom.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build DOF plugin (DustDOF.dll)
        run: >
          msbuild effects\dof\DustDOF.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build SSIL plugin (DustSSIL.dll)
        run: >
          msbuild effects\ssil\DustSSIL.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      # SSS is disabled for now (not ready for release)

      - name: Build Clarity plugin (DustClarity.dll)
        run: >
          msbuild effects\clarity\DustClarity.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Outline plugin (DustOutline.dll)
        run: >
          msbuild effects\outline\DustOutline.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Kuwahara plugin (DustKuwahara.dll)
        run: >
          msbuild effects\kuwahara\DustKuwahara.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir release\Dust\effects
          mkdir release\Dust\effects\shaders
          copy src\build\Release\Dust.dll release\Dust\
          copy effects\ssao\build\Release\DustSSAO.dll release\Dust\effects\
          copy effects\lut\build\Release\DustLUT.dll release\Dust\effects\
          copy effects\bloom\build\Release\DustBloom.dll release\Dust\effects\
          copy effects\dof\build\Release\DustDOF.dll release\Dust\effects\
          copy effects\ssil\build\Release\DustSSIL.dll release\Dust\effects\
          copy effects\clarity\build\Release\DustClarity.dll release\Dust\effects\
          copy effects\outline\build\Release\DustOutline.dll release\Dust\effects\
          copy effects\kuwahara\build\Release\DustKuwahara.dll release\Dust\effects\
          xcopy /Y effects\ssil\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\ssao\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\lut\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\bloom\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\dof\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\clarity\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\outline\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\kuwahara\shaders\* release\Dust\effects\shaders\
          xcopy /S /Y /I effects\presets release\Dust\presets
          copy mod\Dust.mod release\Dust\
          copy mod\RE_Kenshi.json release\Dust\

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        with:
          name: Dust-${{ steps.version.outputs.label }}
          path: release\Dust\
