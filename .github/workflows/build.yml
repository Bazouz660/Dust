name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false

      # Init submodules WITHOUT smudging LFS. KenshiLib_Examples_deps stores
      # KenshiLib.lib + Ogre/MyGUI .libs + boost.zip in upstream LFS, but that
      # account's budget is exhausted intermittently. Dust only actually links
      # against KenshiLib.lib (Ogre/MyGUI .libs are unused) and only needs Boost
      # at the header level, so we skip LFS entirely and fetch what we need
      # from public mirrors below.
      - name: Init submodules without LFS smudge
        shell: bash
        env:
          GIT_LFS_SKIP_SMUDGE: '1'
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1
          # --depth=1 omits tag refs, which `git describe` needs below to map
          # the pinned commit back to a release tag. Pull just the tag refs.
          git -C external/KenshiLib fetch origin --tags --depth=1

      - name: Resolve KenshiLib release tag
        id: kenshilib
        shell: bash
        run: |
          set -eu
          tag=$(git -C external/KenshiLib describe --tags --exact-match HEAD 2>/dev/null || true)
          if [ -z "$tag" ]; then
            sha=$(git -C external/KenshiLib rev-parse HEAD)
            echo "ERROR: KenshiLib submodule HEAD ($sha) is not on a tagged release."
            echo "       Pin it to a release tag (e.g. v0.2.1) so the .lib can be fetched"
            echo "       from KenshiReclaimer/KenshiLib's release assets."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "KenshiLib release tag: $tag"

      - name: Cache KenshiLib.lib
        id: kenshilib_cache
        uses: actions/cache@v4
        with:
          path: external/KenshiLib_Examples_deps/KenshiLib/Libraries/KenshiLib.lib
          key: kenshilib-${{ steps.kenshilib.outputs.tag }}-v1

      - name: Fetch KenshiLib.lib from release assets
        if: steps.kenshilib_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -eu
          tag="${{ steps.kenshilib.outputs.tag }}"
          url="https://github.com/KenshiReclaimer/KenshiLib/releases/download/${tag}/KenshiLib_${tag}.zip"
          dest="external/KenshiLib_Examples_deps/KenshiLib/Libraries"
          mkdir -p "$dest"
          curl -fL --ssl-no-revoke -o /tmp/KenshiLib_${tag}.zip "$url"
          unzip -j -o /tmp/KenshiLib_${tag}.zip "KenshiLib.lib" -d "$dest"
          ls -l "$dest/KenshiLib.lib"

      - name: Cache Boost 1.60 headers
        id: boost_cache
        uses: actions/cache@v4
        with:
          path: external/KenshiLib_Examples_deps/boost_1_60_0/boost
          key: boost-1.60.0-headers-v1

      - name: Fetch Boost 1.60 headers
        if: steps.boost_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -eu
          curl -fL --ssl-no-revoke -o /tmp/boost.tar.bz2 \
            "https://archives.boost.io/release/1.60.0/source/boost_1_60_0.tar.bz2"
          mkdir -p /tmp/boost-extract
          tar -xjf /tmp/boost.tar.bz2 -C /tmp/boost-extract boost_1_60_0/boost
          mkdir -p external/KenshiLib_Examples_deps/boost_1_60_0
          # Replace any existing boost/ dir with the freshly extracted one.
          rm -rf external/KenshiLib_Examples_deps/boost_1_60_0/boost
          mv /tmp/boost-extract/boost_1_60_0/boost external/KenshiLib_Examples_deps/boost_1_60_0/boost

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "label=$TAG" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "value=0.0.0-dev.$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "label=dev-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build boot (DustBoot.dll)
        run: >
          msbuild boot\DustBoot.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build host (Dust.dll)
        run: >
          msbuild src\Dust.vcxproj
          /p:Configuration=Release
          /p:Platform=x64
          /p:ExtraDefines=DUST_VERSION=${{ steps.version.outputs.value }}

      - name: Build SSAO plugin (DustSSAO.dll)
        run: >
          msbuild effects\ssao\DustSSAO.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build LUT plugin (DustLUT.dll)
        run: >
          msbuild effects\lut\DustLUT.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Bloom plugin (DustBloom.dll)
        run: >
          msbuild effects\bloom\DustBloom.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build DOF plugin (DustDOF.dll)
        run: >
          msbuild effects\dof\DustDOF.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build SSIL plugin (DustSSIL.dll)
        run: >
          msbuild effects\ssil\DustSSIL.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Clarity plugin (DustClarity.dll)
        run: >
          msbuild effects\clarity\DustClarity.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Outline plugin (DustOutline.dll)
        run: >
          msbuild effects\outline\DustOutline.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Kuwahara plugin (DustKuwahara.dll)
        run: >
          msbuild effects\kuwahara\DustKuwahara.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build RTGI plugin (DustRTGI.dll)
        run: >
          msbuild effects\rtgi\DustRTGI.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Shadows plugin (DustShadows.dll)
        run: >
          msbuild effects\shadows\DustShadows.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build SMAA plugin (DustSMAA.dll)
        run: >
          msbuild effects\smaa\DustSMAA.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Chromatic Aberration plugin (DustChromaticAberration.dll)
        run: >
          msbuild effects\chromaticaberration\DustChromaticAberration.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Deband plugin (DustDeband.dll)
        run: >
          msbuild effects\deband\DustDeband.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Film Grain plugin (DustFilmGrain.dll)
        run: >
          msbuild effects\filmgrain\DustFilmGrain.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Letterbox plugin (DustLetterbox.dll)
        run: >
          msbuild effects\letterbox\DustLetterbox.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Vignette plugin (DustVignette.dll)
        run: >
          msbuild effects\vignette\DustVignette.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir release\Dust\effects
          mkdir release\Dust\effects\shaders
          copy boot\build\Release\DustBoot.dll release\Dust\
          copy src\build\Release\Dust.dll release\Dust\
          copy effects\ssao\build\Release\DustSSAO.dll release\Dust\effects\
          copy effects\lut\build\Release\DustLUT.dll release\Dust\effects\
          copy effects\bloom\build\Release\DustBloom.dll release\Dust\effects\
          copy effects\dof\build\Release\DustDOF.dll release\Dust\effects\
          copy effects\ssil\build\Release\DustSSIL.dll release\Dust\effects\
          copy effects\clarity\build\Release\DustClarity.dll release\Dust\effects\
          copy effects\outline\build\Release\DustOutline.dll release\Dust\effects\
          copy effects\kuwahara\build\Release\DustKuwahara.dll release\Dust\effects\
          copy effects\rtgi\build\Release\DustRTGI.dll release\Dust\effects\
          copy effects\shadows\build\Release\DustShadows.dll release\Dust\effects\
          copy effects\smaa\build\Release\DustSMAA.dll release\Dust\effects\
          copy effects\chromaticaberration\build\Release\DustChromaticAberration.dll release\Dust\effects\
          copy effects\deband\build\Release\DustDeband.dll release\Dust\effects\
          copy effects\filmgrain\build\Release\DustFilmGrain.dll release\Dust\effects\
          copy effects\letterbox\build\Release\DustLetterbox.dll release\Dust\effects\
          copy effects\vignette\build\Release\DustVignette.dll release\Dust\effects\
          xcopy /Y effects\ssil\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\ssao\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\lut\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\bloom\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\dof\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\clarity\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\outline\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\kuwahara\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\rtgi\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\smaa\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\chromaticaberration\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\deband\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\filmgrain\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\letterbox\shaders\* release\Dust\effects\shaders\
          xcopy /Y effects\vignette\shaders\* release\Dust\effects\shaders\
          xcopy /S /Y /I effects\presets release\Dust\presets
          copy mod\Dust.mod release\Dust\
          copy mod\RE_Kenshi.json release\Dust\

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        with:
          name: Dust-${{ steps.version.outputs.label }}
          path: release\Dust\
