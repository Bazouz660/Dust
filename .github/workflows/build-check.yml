name: Build Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
          lfs: true

      - name: Extract Boost headers
        run: |
          cd external\KenshiLib_Examples_deps\boost_1_60_0
          tar -xf boost.zip

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build host (Dust.dll)
        run: >
          msbuild src\Dust.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build SSAO plugin (DustSSAO.dll)
        run: >
          msbuild effects\ssao\DustSSAO.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build LUT plugin (DustLUT.dll)
        run: >
          msbuild effects\lut\DustLUT.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build Bloom plugin (DustBloom.dll)
        run: >
          msbuild effects\bloom\DustBloom.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build SSIL plugin (DustSSIL.dll)
        run: >
          msbuild effects\ssil\DustSSIL.vcxproj
          /p:Configuration=Release
          /p:Platform=x64

      - name: Build SSS plugin (DustSSS.dll)
        run: >
          msbuild effects\sss\DustSSS.vcxproj
          /p:Configuration=Release
          /p:Platform=x64
