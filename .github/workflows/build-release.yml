name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Clone KenshiLib
        run: git clone --depth 1 https://github.com/KenshiReclaimer/KenshiLib.git external/KenshiLib

      - name: Clone KenshiLib_Examples_deps (with LFS)
        run: |
          git lfs install
          git clone --depth 1 https://github.com/BFrizzleFoShizzle/KenshiLib_Examples_deps.git external/KenshiLib_Examples_deps

      - name: Extract Boost headers
        run: |
          cd external\KenshiLib_Examples_deps\boost_1_60_0
          tar -xf boost.zip

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        env:
          KENSHILIB_DIR: ${{ github.workspace }}\external\KenshiLib
          KENSHILIB_DEPS_DIR: ${{ github.workspace }}\external\KenshiLib_Examples_deps
          BOOST_INCLUDE_PATH: ${{ github.workspace }}\external\KenshiLib_Examples_deps\boost_1_60_0
          BOOST_ROOT: ${{ github.workspace }}\external\KenshiLib_Examples_deps\boost_1_60_0
        run: >
          msbuild src\Dust\Dust.vcxproj
          /p:Configuration=Release
          /p:Platform=x64
          /p:ExtraDefines=DUST_VERSION=${{ steps.version.outputs.value }}

      - name: Package release
        run: |
          mkdir release\Dust\shaders
          copy src\Dust\build\Release\Dust.dll release\Dust\
          copy mod\RE_Kenshi.json release\Dust\
          copy mod\shaders\deferred.hlsl release\Dust\shaders\
          cd release
          tar -acf ..\Dust-${{ github.ref_name }}.zip Dust

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dust-${{ github.ref_name }}.zip
          generate_release_notes: true
