name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.3). Leave empty for dev build."
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      DUST_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || (inputs.version && format('v{0}', inputs.version) || '') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "$DUST_VERSION" ]; then
            echo "value=${DUST_VERSION#v}" >> "$GITHUB_OUTPUT"
            echo "label=$DUST_VERSION" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "value=0.0.0-dev.$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "label=dev-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone KenshiLib
        run: git clone --depth 1 https://github.com/KenshiReclaimer/KenshiLib.git external/KenshiLib

      - name: Clone KenshiLib_Examples_deps (with LFS)
        run: |
          git lfs install
          git clone --depth 1 https://github.com/BFrizzleFoShizzle/KenshiLib_Examples_deps.git external/KenshiLib_Examples_deps

      - name: Extract Boost headers
        run: |
          cd external\KenshiLib_Examples_deps\boost_1_60_0
          tar -xf boost.zip

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build
        env:
          KENSHILIB_DIR: ${{ github.workspace }}\external\KenshiLib
          KENSHILIB_DEPS_DIR: ${{ github.workspace }}\external\KenshiLib_Examples_deps
          BOOST_INCLUDE_PATH: ${{ github.workspace }}\external\KenshiLib_Examples_deps\boost_1_60_0
          BOOST_ROOT: ${{ github.workspace }}\external\KenshiLib_Examples_deps\boost_1_60_0
        run: >
          msbuild src\Dust\Dust.vcxproj
          /p:Configuration=Release
          /p:Platform=x64
          /p:ExtraDefines=DUST_VERSION=${{ steps.version.outputs.value }}

      - name: Package release
        run: |
          mkdir release\Dust\shaders
          copy src\Dust\build\Release\Dust.dll release\Dust\
          copy mod\RE_Kenshi.json release\Dust\
          copy mod\shaders\deferred.hlsl release\Dust\shaders\
          cd release
          tar -acf ..\Dust-${{ steps.version.outputs.label }}.zip Dust

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: Dust-${{ steps.version.outputs.label }}
          path: release\Dust\

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: Dust-${{ steps.version.outputs.label }}.zip
          generate_release_notes: true
